name: zenrouter_chat_ui
description: >-
  Slot-based chat UI components for ZenRouter. Provides ChatCoordinatorMixin,
  ChatListController, and a four-slot shell layout (top bar, pinned view, body,
  bottom bar) backed by NavigationPath slots.
version: 1.0.0

repository: https://github.com/definev/zenrouter
homepage: https://github.com/definev/zenrouter/tree/main/packages/zenrouter_chat_ui

topics:
  - router
  - navigation
  - zenrouter
  - chat
  - slot-ui

environment:
  sdk: ^3.8.0
  flutter: ">=3.0.0"

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  zenrouter: ^2.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
